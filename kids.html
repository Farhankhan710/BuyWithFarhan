<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Kids' Wear & Toys - BuyWithFarhan</title>
    <style>
        /* Base Styles */
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8fafc; /* Clean Light Background */
            color: #0a192f;
        }

        /* ENTRY ANIMATIONS */
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* STYLISH BACK BUTTON */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: #0a192f;
            font-weight: 600;
            font-size: 14px;
            padding: 8px 16px;
            background: white;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 2px 10px rgba(10, 25, 47, 0.05);
            transition: all 0.3s ease;
            animation: slideDown 0.6s ease forwards;
        }

        .back-btn:hover {
            background: #0a192f;
            color: white;
            border-color: #0a192f;
            box-shadow: 0 4px 15px rgba(10, 25, 47, 0.2);
        }

        /* Page Heading */
        h2 {
            margin: 25px 0 15px 0;
            font-size: 24px;
            font-weight: 700;
            color: #0a192f;
            animation: slideDown 0.7s ease forwards;
        }

        /* CATEGORY FILTER BUTTONS CONTAINER */
        .filter-container {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 5px 2px 15px 2px;
            margin-bottom: 15px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        /* Hide horizontal scrollbar line */
        .filter-container::-webkit-scrollbar {
            display: none;
        }
        
        .filter-btn {
            background: white;
            border: 1px solid #cbd5e1;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s ease;
            color: #475569;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        /* NAVY BLUE ACTIVE STATE */
        .filter-btn.active {
            background: #0a192f;
            color: white;
            border-color: #0a192f;
            box-shadow: 0 4px 12px rgba(10, 25, 47, 0.25);
        }

        /* GRID CONTAINER */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            animation: fadeInUp 0.8s ease forwards;
        }

        /* PREMIUM PRODUCT CARD */
        .product-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 12px rgba(10, 25, 47, 0.04);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            border: 1px solid #e2e8f0;
            height: 100%;
            justify-content: space-between;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 24px rgba(10, 25, 47, 0.12);
        }

        .product-image-wrapper {
            position: relative;
            width: 100%;
            padding-top: 100px;
            overflow: hidden;
            background: #f1f5f9;
        }

        .product-card img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-info {
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex-grow: 1;
        }

        .product-title {
            margin: 0;
            font-size: 14px;
            font-weight: 600;
            color: #0a192f;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .product-price {
            font-size: 16px;
            font-weight: 700;
            color: #0a192f;
        }

        .buy-now-btn {
            display: block;
            text-align: center;
            background: #172a45; /* Medium Navy */
            color: white;
            text-decoration: none;
            padding: 9px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            margin-top: auto;
            transition: background 0.2s ease;
            cursor: pointer;
            border: none;
            width: 100%;
            box-sizing: border-box;
        }

        .buy-now-btn:hover {
            background: #0a192f; /* Deep Navy */
        }

        .back-home-btn {
            display: inline-block;
            text-decoration: none;
            color: #0a192f;
            font-weight: 600;
            padding: 10px 20px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            background: white;
            transition: all 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .back-home-btn:hover {
            background: #f1f5f9;
        }

        /* CHECKOUT POPUP */
        .order-popup {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 25, 47, 0.5); 
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 15px;
            box-sizing: border-box;
        }
        .popup-content {
            background: #ffffff;
            padding: 22px;
            border-radius: 14px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(10, 25, 47, 0.2);
            position: relative;
            box-sizing: border-box;
            border: 2px solid #e2e8f0;
            text-align: left;
        }
        .close-btn {
            position: absolute;
            top: 10px; right: 15px;
            font-size: 24px;
            color: #0a192f;
            cursor: pointer;
            font-weight: bold;
        }
        .form-group {
            margin-bottom: 12px;
            text-align: left;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 4px;
            color: #0a192f;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 9px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
            background-color: #f8fafc;
        }
        .submit-order-btn {
            background-color: #0a192f; 
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(10, 25, 47, 0.15);
        }
        .submit-order-btn:hover {
            background-color: #172a45;
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        Back
    </a>

    <h2>All Kids' Wear & Toys Collection</h2>

    <div class="filter-container">
        <button class="filter-btn active" onclick="filterCategory('all', this)">All Items</button>
        <button class="filter-btn" onclick="filterCategory('boys', this)">Boys Wear</button>
        <button class="filter-btn" onclick="filterCategory('girls', this)">Girls Wear</button>
        <button class="filter-btn" onclick="filterCategory('infants', this)">Infants & Toddlers</button>
        <button class="filter-btn" onclick="filterCategory('toys', this)">Toys & Games</button>
        <button class="filter-btn" onclick="filterCategory('footwear', this)">Kids' Footwear</button>
    </div>

    <div class="grid-container">

        <div class="product-card" data-category="boys">
            <div class="product-image-wrapper">
                <img src="https://rukminim2.flixcart.com/image/612/612/xif0q/kids-clothing-set/j/k/5/3-4-years-clothing-set-boy-pant-shirt-style-vimal-fashion-original-imahfmyfeyfy9zhq.jpeg?q=70" alt="Boys Suit">
            </div>
            <div class="product-info">
                <h4 class="product-title">Boys Party Blazer Suit Set</h4>
                <div class="product-price">₹399</div>
                <button onclick="openOrderForm('Boys Party Blazer Suit Set', '₹399')" class="buy-now-btn">Buy Now</button>
            </div>
        </div>

        <div class="product-card" data-category="girls">
            <div class="product-image-wrapper">
                <img src="https://rukminim2.flixcart.com/image/612/612/xif0q/kids-apparel-combo/g/n/o/2-3-years-girls-frock-plasma-combo-be-fashionable-original-imahfrzhb8z8z9ha.jpeg?q=70" alt="Girls Frock">
            </div>
            <div class="product-info">
                <h4 class="product-title">Girls Cute Floral Frock</h4>
                <div class="product-price">₹299</div>
                <button onclick="openOrderForm('Girls Cute Floral Frock', '₹299')" class="buy-now-btn">Buy Now</button>
            </div>
        </div>

        <div class="product-card" data-category="infants">
            <div class="product-image-wrapper">
                <img src="https://rukminim2.flixcart.com/image/612/612/xif0q/baby-romper/j/w/u/0-3-months-b-romp-bear-try-this-original-imagpgyfhkz94vug.jpeg?q=70" alt="Baby Romper">
            </div>
            <div class="product-info">
                <h4 class="product-title">Infant Soft Cotton Romper</h4>
                <div class="product-price">₹199</div>
                <button onclick="openOrderForm('Infant Soft Cotton Romper', '₹199')" class="buy-now-btn">Buy Now</button>
            </div>
        </div>

        <div class="product-card" data-category="toys">
            <div class="product-image-wrapper">
                <img src="https://rukminim2.flixcart.com/image/612/612/kk76wsw0/learning-toy/g/f/7/lcd-writing-pad-e-note-pad-with-stylus-pen-8-5-inch-for-drawing-original-imafzkgeyd89tvyc.jpeg?q=70" alt="LCD Pad">
            </div>
            <div class="product-info">
                <h4 class="product-title">LCD Magic Writing E-Tablet</h4>
                <div class="product-price">₹149</div>
                <button onclick="openOrderForm('LCD Magic Writing E-Tablet', '₹149')" class="buy-now-btn">Buy Now</button>
            </div>
        </div>

        <div class="product-card" data-category="footwear">
            <div class="product-image-wrapper">
                <img src="https://rukminim2.flixcart.com/image/612/612/xif0q/kids-shoe/s/a/b/8-kids-sports-shoes-8-bata-blue-original-imahk9zfuzhgzhz8.jpeg?q=70" alt="Kids Sneakers">
            </div>
            <div class="product-info">
                <h4 class="product-title">Kids Premium Sports Sneakers</h4>
                <div class="product-price">₹349</div>
                <button onclick="openOrderForm('Kids Premium Sports Sneakers', '₹349')" class="buy-now-btn">Buy Now</button>
            </div>
        </div>

    </div>

    <div style="margin-top: 40px; text-align: center;">
        <a href="./index.html" class="back-home-btn">
            ← Back To Home
        </a>
    </div>

    <div id="orderFormPopup" class="order-popup">
        <div class="popup-content">
            <span class="close-btn" onclick="closeOrderForm()">&times;</span>
            <h3 style="margin-top:0; color: #0a192f; border-bottom: 2px solid #0a192f; padding-bottom: 8px; font-size: 18px;">Checkout Form</h3>
            <input type="hidden" id="selectedProductName">
            <input type="hidden" id="selectedProductPrice">
            
            <div style="background: #f1f5f9; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 14px; font-weight: bold; color: #0a192f; border: 1px solid #cbd5e1;">
                Product: <span id="displayProdName" style="color:#172a45;"></span><br>
                Price: <span id="displayProdPrice" style="color:#172a45;"></span>
            </div>
            
            <div class="form-group"><label>Your Full Name:</label><input type="text" id="custName" placeholder="Enter your name" required></div>
            <div class="form-group"><label>Mobile Number:</label><input type="tel" id="custPhone" placeholder="Enter 10-digit number" required></div>
            <div class="form-group"><label>Area Pincode:</label><input type="number" id="custPincode" placeholder="Enter 6-digit pincode" required></div>
            <div class="form-group"><label>Full Address:</label><textarea id="custAddress" placeholder="House No, Road, City, State" required></textarea></div>
            <p style="font-size: 12px; color: #64748b; font-weight: bold; text-align: left;">* Method: Cash on Delivery (COD)</p>
            <button class="submit-order-btn" onclick="sendOrderToWhatsApp()">Confirm Order on WhatsApp</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        // 1. Live Category Filtering Logic
        let currentSelectedCategory = 'all';

        function filterCategory(category, button) {
            currentSelectedCategory = category;
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            if(button) button.classList.add('active');

            const cards = document.querySelectorAll('.product-card');
            cards.forEach(card => {
                if (category === 'all' || card.getAttribute('data-category') === category) {
                    card.style.display = 'flex';
                } else {
                    card.style.display = 'none';
                }
            });
        }

        // 2. WhatsApp Dropshipping System Logic
        function openOrderForm(pName, pPrice) {
            document.getElementById('selectedProductName').value = pName; 
            document.getElementById('selectedProductPrice').value = pPrice;
            document.getElementById('displayProdName').innerText = pName; 
            document.getElementById('displayProdPrice').innerText = pPrice;
            document.getElementById('orderFormPopup').style.display = 'flex';
        }
        
        function closeOrderForm() { 
            document.getElementById('orderFormPopup').style.display = 'none'; 
        }
        
        function sendOrderToWhatsApp() {
            var name = document.getElementById('custName').value.trim(); 
            var phone = document.getElementById('custPhone').value.trim();
            var pincode = document.getElementById('custPincode').value.trim(); 
            var address = document.getElementById('custAddress').value.trim();
            
            if(!name || !phone || !pincode || !address) { 
                alert("Please fill all fields!"); 
                return; 
            }
            
            var msg = "*📦 NEW ORDER (KIDS CATALOG)*\n\n*Product:* " + document.getElementById('selectedProductName').value + "\n*Price:* " + document.getElementById('selectedProductPrice').value + "\n\n*Customer Details:*\n• Name: " + name + "\n• Mobile: " + phone + "\n• Pincode: " + pincode + "\n• Address: " + address + "\n\n*COD Method Available*";
            window.open("https://wa.me/918849668317?text=" + encodeURIComponent(msg), '_blank');
            closeOrderForm();
        }

        // 3. FIREBASE DYNAMIC DATA LOGIC
        const firebaseConfigDetails = {
            apiKey: "AIzaSyB70CUmZ0pBMJxuESbTIPmUEjLyEfXkLKQ",
            authDomain: "bywithfarhan.firebaseapp.com",
            projectId: "bywithfarhan",
            appId: "1:73400600521:web:cec78a693ec128d3270a18"
        };
        
        // Initialize Firebase safely
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfigDetails);
        }
        const clientDb = firebase.firestore();

        // CHANGE: "kids" page ka dynamic live data sync karne ke liye route badla hai
        const currentPage = "kids";

        clientDb.collection("products")
            .where("page", "==", currentPage)
            .orderBy("timestamp", "desc")
            .onSnapshot(snapshot => {
                const gridContainer = document.querySelector('.grid-container');
                snapshot.docChanges().forEach(change => {
                    if (change.type === "added") {
                        const data = change.doc.data();
                        const cardHtml = `
                            <div class="product-card" data-category="${data.category}">
                                <div class="product-image-wrapper">
                                    <img src="${data.img}" alt="${data.name}">
                                </div>
                                <div class="product-info">
                                    <h4 class="product-title">${data.name}</h4>
                                    <div class="product-price">₹${data.price}</div>
                                    <button onclick="openOrderForm('${data.name.replace(/'/g, "\\'")}', '₹${data.price}')" class="buy-now-btn">Buy Now</button>
                                </div>
                            </div>
                        `;
                        gridContainer.insertAdjacentHTML('afterbegin', cardHtml);
                    }
                });
                // Live product fetch hone par filtering update ho jayegi
                filterCategory(currentSelectedCategory, document.querySelector('.filter-btn.active'));
            });
    </script>
</body>
</html>
